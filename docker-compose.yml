services:
  postgres:
    image: postgres:16
    container_name: ${POSTGRES_CONTAINER_NAME:-bdsnowflake-postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bdsnowflake}
      POSTGRES_USER: ${POSTGRES_USER:-bdsnowflake}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bdsnowflake}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
      - "./исходные данные:/data:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bdsnowflake} -d ${POSTGRES_DB:-bdsnowflake}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
